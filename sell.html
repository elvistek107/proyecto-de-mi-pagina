<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vender · Retro Arch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="site-shell">
        <header class="header">
            <div class="container header__inner">
                <a href="index.html" class="logo">
                    <span class="logo__mark">RA</span>
                    <span class="logo__text">Retro Arch</span>
                </a>
                <nav class="nav" id="navMenu">
                    <a href="index.html" class="nav__link">Inicio</a>
                    <a href="catalog.html" class="nav__link">Catálogo</a>
                    <a href="sell.html" class="nav__link">Vender</a>
                    <a href="profile.html" class="nav__link">Perfil</a>
                </nav>
                <div class="header__actions">
                    <a href="cart.html" class="cart-link" aria-label="Ver carrito">
                        <span>🛒</span>
                        <span class="cart-link__count" id="cartCount">0</span>
                    </a>
                    <button class="hamburger" id="hamburger" type="button" aria-label="Abrir menú">
                        <span></span><span></span><span></span>
                    </button>
                </div>
            </div>
            <div class="container header__search-wrap">
                <div class="search-shell" id="searchShell">
                    <span class="search-shell__icon">⌕</span>
                    <input id="searchInput" class="search-shell__input" type="search"
                        placeholder="Buscar buzos, jeans..." autocomplete="off" />
                    <button class="search-shell__clear" id="searchClear" type="button"
                        aria-label="Limpiar búsqueda">×</button>
                </div>
            </div>
            <div class="search-overlay" id="searchOverlay">
                <div class="search-overlay__panel">
                    <div class="search-overlay__section">
                        <p class="search-overlay__title">Recientes</p>
                        <button class="search-overlay__pill" data-suggest="Buzo oversized gris">Buzo oversized
                            gris</button>
                        <button class="search-overlay__pill" data-suggest="Jeans black">Jeans black</button>
                    </div>
                    <div class="search-overlay__section">
                        <p class="search-overlay__title">Categorías rápidas</p>
                        <div class="search-overlay__chips">
                            <button class="search-overlay__chip" data-suggest="Camperas">Camperas</button>
                            <button class="search-overlay__chip" data-suggest="Jeans Baggy">Jeans Baggy</button>
                            <button class="search-overlay__chip" data-suggest="Buzos">Buzos</button>
                            <button class="search-overlay__chip" data-suggest="Remeras">Remeras</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="sell-page">
            <section class="section">
                <div class="container">
                    <div class="sell-panel">
                        <div class="section__head" style="text-align:left; margin-bottom: 1rem;">
                            <p class="section__tag">➕ Publicar producto</p>
                            <h2 class="section__title">Vender una prenda</h2>
                        </div>
                        <form class="sell-form">
                            <input class="input" type="text" placeholder="Nombre del producto" />
                            <select class="select-input">
                                <option>Categoría</option>
                                <option>Jeans Baggy</option>
                                <option>Jeans Skinny</option>
                                <option>Remeras Relaxed Fit</option>
                                <option>Chombas</option>
                                <option>Buzos</option>
                                <option>Camperas</option>
                            </select>
                            <input class="input" type="number" placeholder="Precio" />
                            <textarea class="textarea" rows="5" placeholder="Descripción del producto"></textarea>
                            <input class="file-input" type="file" />
                            <button class="publish-btn" type="submit">Publicar</button>
                        </form>
                        <div class="preview-box">
                            <img id="previewImage" src="" alt="Vista previa" />
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="container footer__inner">
                <p>© <span id="year"></span> Retro Arch</p>
            </div>
        </footer>
        <div class="login-modal" id="loginModal" aria-hidden="true">
            <div class="login-modal__backdrop" data-close-login></div>
            <div class="login-modal__panel">
                <button class="login-modal__close" id="closeLogin" type="button"
                    aria-label="Cerrar inicio de sesión">×</button>
                <div class="login-modal__brand">
                    <span class="login-modal__brand-mark">RA</span>
                </div>
                <p class="login-modal__eyebrow">¡Qué bueno verte de nuevo!</p>
                <h3 class="login-modal__title">Ingresa a tu cuenta</h3>
                <div class="login-modal__actions">
                    <button class="login-social-btn login-social-btn--google" id="googleLogin" type="button">
                        <span class="login-social-btn__icon">G</span>
                        Continuar con Google
                    </button>
                    <button class="login-social-btn login-social-btn--apple" data-provider="apple" type="button">
                        <span class="login-social-btn__icon"></span>
                        Continuar con Apple
                    </button>
                    <button class="login-social-btn login-social-btn--whatsapp" data-provider="whatsapp" type="button">
                        <span class="login-social-btn__icon">W</span>
                        Continuar con WhatsApp
                    </button>
                    <button class="login-social-btn login-social-btn--magic" data-provider="magic" type="button">
                        <span class="login-social-btn__icon">✉</span>
                        Enviar enlace mágico
                    </button>
                </div>
                <div class="login-divider"><span>o usa tu correo</span></div>
                <form class="login-form" id="loginForm" data-provider="email">
                    <label class="login-form__field">
                        <span>Email</span>
                        <input type="email" name="loginEmail" placeholder="tu@email.com" autocomplete="email"
                            required />
                    </label>
                    <label class="login-form__field login-form__field--phone" hidden>
                        <span>Número de WhatsApp</span>
                        <input type="tel" name="phoneNumber" placeholder="+54 9 11 1234 5678" autocomplete="tel" />
                    </label>
                    <label class="login-form__field login-form__field--otp" hidden>
                        <span>Código de verificación</span>
                        <input type="text" name="otpCode" placeholder="123456" inputmode="numeric" />
                    </label>
                    <label class="login-form__field login-form__field--password">
                        <span>Contraseña</span>
                        <div class="password-input-wrap">
                            <input type="password" name="loginPassword" placeholder="••••••••"
                                autocomplete="current-password" />
                            <button class="password-toggle" type="button" aria-label="Mostrar contraseña">👁</button>
                        </div>
                    </label>
                    <label class="login-remember">
                        <input type="checkbox" name="rememberMe" checked />
                        <span>Mantener sesión iniciada</span>
                    </label>
                    <button type="submit" class="btn login-submit-btn btn--block">Ingresar</button>
                    <p class="login-status" id="loginStatus" role="status" aria-live="polite"></p>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>

</html>
